# CI — build & unit test on Ubuntu, build on Windows & macOS
name: CI

on:
  push:
    branches: [master, dev, 'feat/**', 'fix/**']
  pull_request:
    branches: [master]

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  # ── Linux ──────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build

      - name: Configure (CPU only + tests)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          -DQWEN_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Configure (shared library)
        run: >
          cmake -B build-shared -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          -DQWEN_SHARED=ON

      - name: Build shared library
        run: cmake --build build-shared --parallel

  # ── Windows ────────────────────────────────────────────────────────
  windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CPU only)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

  # ── macOS ──────────────────────────────────────────────────────────
  macos:
    runs-on: macos-14  # Apple Silicon

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Metal enabled + tests)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          -DGGML_METAL=ON
          -DQWEN_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure
